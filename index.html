<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stone-paper-scissor-game</title>
</head>
<body>
    <h1>WELCOME TO STONE-PAPER-SCISSOR GAME</h1>
    <p>choose 1,2, or 3:</p>
    <ol>
        <li>stone</li>
        <li>paper</li>
        <li>scissor</li>
    </ol>
    <input type="number" min="1" max="3" id="getChoice">
    <button id="putChoice">SAVE</button>
    <button id="startGame">START!!</button>
    <button id="scoreReset">SCORE RESET</button>
    <script src="script.js"></script>
</body>
</html>
